name: Sincronizar fuentes externas

# Trae desaparecidos de fuentes adicionales (terremotovenezuela.app y
# venezuelatebusca.com) y los upsertea en Supabase por dedupe_key.
# GitHub no garantiza el minuto exacto del cron; en picos puede retrasarse.
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {} # permite ejecutarlo a mano desde la pestaña Actions

concurrency:
  group: sync-fuentes
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Ejecutar sync de fuentes
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/sync-fuentes.mjs
